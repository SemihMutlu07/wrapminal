<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc-lens Agent Wrapped</title>
<style>
  :root {
    --paper: #f6f1e4;
    --paper-2: #fffaf0;
    --ink: #16130f;
    --muted: #6e675e;
    --line: #242019;
    --green: #b7ff4a;
    --red: #ff4f3e;
    --cyan: #61d6ff;
    --amber: #ffc247;
    --violet: #a58bff;
    --shadow: 5px 5px 0 var(--line);
    --mono: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", ui-monospace, monospace;
    --serif: Georgia, "Times New Roman", serif;
  }

  * { box-sizing: border-box; }

  html, body {
    min-height: 100%;
    margin: 0;
    background:
      linear-gradient(90deg, rgba(22,19,15,0.05) 1px, transparent 1px),
      linear-gradient(rgba(22,19,15,0.05) 1px, transparent 1px),
      var(--paper);
    background-size: 34px 34px;
    color: var(--ink);
    font-family: var(--mono);
  }

  button {
    min-height: 44px;
    border: 2px solid var(--line);
    background: var(--paper-2);
    color: var(--ink);
    font: 700 0.78rem var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 0 14px;
    box-shadow: 3px 3px 0 var(--line);
    cursor: pointer;
  }

  button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--line); }
  button:active { transform: translate(2px, 2px); box-shadow: none; }

  .page {
    width: min(1260px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 44px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .brand-mark {
    display: grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border: 2px solid var(--line);
    background: var(--green);
    box-shadow: 3px 3px 0 var(--line);
  }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
    gap: 18px;
    align-items: stretch;
    margin-bottom: 18px;
  }

  .headline {
    border: 3px solid var(--line);
    background: var(--paper-2);
    box-shadow: var(--shadow);
    padding: clamp(20px, 3vw, 34px);
    min-height: 268px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 2px solid var(--line);
    background: var(--cyan);
    padding: 7px 10px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.72rem;
    margin-bottom: 18px;
  }

  h1 {
    margin: 0;
    font-family: var(--serif);
    font-size: clamp(3.2rem, 8vw, 7.8rem);
    line-height: 0.82;
    letter-spacing: 0;
  }

  .hero-copy {
    max-width: 720px;
    margin: 18px 0 0;
    color: var(--muted);
    font-size: 0.94rem;
    line-height: 1.55;
  }

  .scoreboard {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .metric {
    border: 3px solid var(--line);
    background: var(--paper-2);
    box-shadow: var(--shadow);
    padding: 16px;
    min-height: 128px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .metric:nth-child(1) { background: var(--green); }
  .metric:nth-child(2) { background: var(--amber); }
  .metric:nth-child(3) { background: var(--cyan); }
  .metric:nth-child(4) { background: var(--violet); }

  .metric-value {
    display: block;
    font-family: var(--serif);
    font-size: clamp(2.2rem, 5vw, 4.2rem);
    line-height: 0.9;
    font-weight: 900;
  }

  .metric-label {
    display: block;
    margin-top: 10px;
    font-size: 0.72rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .band {
    border-top: 3px solid var(--line);
    padding-top: 18px;
    margin-top: 24px;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 12px;
  }

  .section-head h2 {
    margin: 0;
    font-size: 0.92rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .stamp {
    color: var(--muted);
    font-size: 0.72rem;
  }

  .source-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .source {
    border: 2px solid var(--line);
    background: var(--paper-2);
    padding: 12px;
    min-height: 112px;
    position: relative;
  }

  .source::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 8px;
    background: var(--muted);
    border-bottom: 2px solid var(--line);
  }

  .source.loaded::before { background: var(--green); }
  .source.detected::before { background: var(--amber); }
  .source.error::before { background: var(--red); }

  .source-name {
    margin-top: 12px;
    font-weight: 900;
    font-size: 0.88rem;
  }

  .source-state {
    margin-top: 8px;
    font-size: 0.7rem;
    color: var(--muted);
    line-height: 1.35;
  }

  .wrapped-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .wrapped-card,
  .project-row,
  .agent-row,
  .timeline-panel,
  .empty {
    border: 3px solid var(--line);
    background: var(--paper-2);
    box-shadow: var(--shadow);
  }

  .wrapped-card {
    min-height: 180px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .wrapped-card:nth-child(4n+1) { background: var(--green); }
  .wrapped-card:nth-child(4n+2) { background: var(--cyan); }
  .wrapped-card:nth-child(4n+3) { background: var(--amber); }
  .wrapped-card:nth-child(4n+4) { background: var(--violet); }

  .wrapped-title {
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 900;
  }

  .wrapped-value {
    margin: 16px 0;
    font-family: var(--serif);
    font-size: clamp(1.8rem, 3.4vw, 3.2rem);
    line-height: 0.92;
    font-weight: 900;
    overflow-wrap: anywhere;
  }

  .wrapped-detail {
    color: rgba(22,19,15,0.72);
    font-size: 0.78rem;
    line-height: 1.35;
  }

  .split {
    display: grid;
    grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
    gap: 14px;
  }

  .agent-list,
  .project-list {
    display: grid;
    gap: 10px;
  }

  .agent-row,
  .project-row {
    padding: 14px;
  }

  .row-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 10px;
  }

  .row-name {
    font-weight: 900;
    overflow-wrap: anywhere;
  }

  .row-meta {
    color: var(--muted);
    font-size: 0.72rem;
    white-space: nowrap;
  }

  .bar {
    height: 18px;
    border: 2px solid var(--line);
    background: var(--paper);
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-right: 2px solid var(--line);
    transition: width 650ms ease;
  }

  .project-row:nth-child(3n+1) .bar-fill { background: var(--red); }
  .project-row:nth-child(3n+2) .bar-fill { background: var(--cyan); }
  .project-row:nth-child(3n+3) .bar-fill { background: var(--amber); }

  .timeline-panel {
    padding: 16px;
    overflow-x: auto;
  }

  .weeks {
    display: flex;
    align-items: flex-end;
    gap: 5px;
    height: 168px;
    min-width: 680px;
    padding-top: 20px;
  }

  .week {
    flex: 1;
    min-width: 16px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: stretch;
    gap: 5px;
  }

  .week-bar {
    min-height: 3px;
    border: 2px solid var(--line);
    background: var(--red);
    transition: height 650ms ease;
  }

  .week:nth-child(4n+2) .week-bar { background: var(--green); }
  .week:nth-child(4n+3) .week-bar { background: var(--cyan); }
  .week:nth-child(4n+4) .week-bar { background: var(--amber); }

  .week-label {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-size: 0.58rem;
    color: var(--muted);
    height: 44px;
    overflow: hidden;
  }

  .empty {
    padding: 22px;
    color: var(--muted);
    line-height: 1.55;
  }

  .hidden { display: none !important; }

  @media (max-width: 980px) {
    .hero,
    .split {
      grid-template-columns: 1fr;
    }

    .source-grid,
    .wrapped-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 620px) {
    .page { width: min(100% - 20px, 1260px); padding-top: 12px; }
    .topbar { align-items: flex-start; flex-direction: column; }
    .actions { justify-content: flex-start; }
    .scoreboard,
    .source-grid,
    .wrapped-grid {
      grid-template-columns: 1fr;
    }
    .headline { min-height: 0; }
  }
</style>
</head>
<body>
<main class="page">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">CC</span>
      <span>cc-lens</span>
    </div>
    <div class="actions">
      <button id="privacy-btn" type="button">Reveal</button>
      <button id="sample-btn" type="button">Sample</button>
      <button id="export-btn" type="button">Export SVG</button>
    </div>
  </header>

  <section class="hero">
    <div class="headline">
      <div class="eyebrow">Local only · nothing is uploaded</div>
      <h1>Agent<br>Wrapped</h1>
      <p class="hero-copy" id="hero-copy">Reading local agent history. Raw prompts stay on your machine and are never rendered — only aggregate counts.</p>
    </div>
    <div class="scoreboard" id="scoreboard"></div>
  </section>

  <section class="band">
    <div class="section-head">
      <h2>Wrapped cards</h2>
      <span class="stamp">estimated from local history files</span>
    </div>
    <div class="wrapped-grid" id="highlights"></div>
  </section>

  <section class="band">
    <div class="section-head">
      <h2>Source health</h2>
      <span class="stamp" id="generated-at"></span>
    </div>
    <div class="source-grid" id="sources"></div>
  </section>

  <section class="band split">
    <div>
      <div class="section-head">
        <h2>Agent mix</h2>
      </div>
      <div class="agent-list" id="agents"></div>
    </div>
    <div>
      <div class="section-head">
        <h2>Top projects</h2>
      </div>
      <div class="project-list" id="projects"></div>
    </div>
  </section>

  <section class="band">
    <div class="section-head">
      <h2>Weekly activity</h2>
      <span class="stamp" id="timeline-stamp"></span>
    </div>
    <div class="timeline-panel">
      <div class="weeks" id="weeks"></div>
    </div>
  </section>
</main>

<script>
let wrapped = null;
let privacy = true;

const sampleWrapped = {
  generated_at: new Date().toISOString(),
  sources: [
    { id: 'claude', name: 'Claude Code', state: 'loaded', records: 184, confidence: 'estimated', message: 'Claude prompts loaded.' },
    { id: 'codex', name: 'Codex CLI', state: 'loaded', records: 76, confidence: 'estimated', message: 'Codex prompts loaded.' },
    { id: 'gemini', name: 'Gemini / Antigravity', state: 'loaded', records: 31, confidence: 'estimated', message: 'Gemini prompts loaded.' },
    { id: 'continue', name: 'Continue.dev', state: 'loaded', records: 18, confidence: 'estimated', message: 'Continue.dev prompts loaded.' },
    { id: 'aider', name: 'Aider', state: 'loaded', records: 9, confidence: 'estimated', message: 'Aider prompts loaded.' },
    { id: 'cursor', name: 'Cursor', state: 'detected', records: 42, confidence: 'experimental', message: 'Cursor prompt history detected (best-effort), no per-prompt timestamps.' },
    { id: 'opencode', name: 'OpenCode', state: 'detected', records: 0, confidence: 'experimental', message: 'OpenCode database detected.' },
    { id: 'windsurf', name: 'Windsurf / Codeium', state: 'detected', records: 0, confidence: 'detected', message: 'Windsurf/Codeium storage detected.' },
    { id: 'cline', name: 'Cline / Roo', state: 'missing', records: 0, confidence: 'detected', message: 'No Cline/Roo storage found.' },
    { id: 'pi', name: 'pi', state: 'missing', records: 0, confidence: 'detected', message: 'No pi storage found.' },
    { id: 'hermes', name: 'hermes', state: 'missing', records: 0, confidence: 'detected', message: 'No hermes storage found.' }
  ],
  totals: { prompts: 291, sessions: 42, projects: 9, sources: 3, active_days: 24, estimated_tokens: 118400 },
  highlights: [
    { title: 'Top project', value: 'letterboxd_wrapped', detail: '91 prompts via Claude Code' },
    { title: 'Main agent', value: 'Claude Code', detail: '184 prompts captured locally' },
    { title: 'Busiest week', value: 'Jun 08 - Jun 14', detail: '82 prompts across 11 sessions' },
    { title: 'Longest streak', value: '8 days', detail: 'Consecutive days with AI coding activity' },
    { title: 'Peak hour', value: '21:00', detail: '39 prompts started in this hour' },
    { title: 'Weekend mode', value: '53 prompts', detail: '18% of all captured activity' }
  ],
  source_breakdown: [
    { id: 'claude', name: 'Claude Code', prompts: 184, sessions: 27, tokens: 82100 },
    { id: 'codex', name: 'Codex CLI', prompts: 76, sessions: 9, tokens: 21400 },
    { id: 'gemini', name: 'Gemini / Antigravity', prompts: 31, sessions: 6, tokens: 14900 }
  ],
  projects: [
    { name: 'letterboxd_wrapped', source: 'Claude Code', prompts: 91, sessions: 12, active_days: 8, tokens: 40400 },
    { name: 'job_search', source: 'Claude Code', prompts: 43, sessions: 6, active_days: 5, tokens: 18200 },
    { name: 'Codex CLI', source: 'Codex CLI', prompts: 76, sessions: 9, active_days: 11, tokens: 21400 },
    { name: 'cc_lens', source: 'Gemini / Antigravity', prompts: 31, sessions: 6, active_days: 4, tokens: 14900 }
  ],
  timeline: {
    active_weeks: 8,
    total_weeks: 10,
    weeks: Array.from({ length: 10 }).map((_, i) => ({
      week: '2026-W' + String(i + 14).padStart(2, '0'),
      label: 'W' + (i + 14),
      prompts: [12, 18, 9, 33, 21, 45, 28, 82, 31, 12][i],
      sessions: [2, 3, 2, 6, 4, 7, 5, 11, 4, 2][i],
      tokens: 1000
    }))
  }
};

function esc(value) {
  const div = document.createElement('div');
  div.textContent = String(value ?? '');
  return div.innerHTML;
}

function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n ?? 0);
}

// Privacy mask: replace the real project name with a fixed, length-independent
// funny codename, so a shared screenshot leaks neither the name nor its length.
// The same name always maps to the same codename, so the reveal toggle is stable.
const FUN_NAMES = [
  'fuzzling', 'blabbering', 'schlepping', 'cogitating', 'noodling',
  'percolating', 'marinating', 'ruminating', 'conjuring', 'finagling',
  'bamboozling', 'discombobulating', 'wrangling', 'bedazzling', 'flummoxing',
  'kerfuffling', 'razzmatazzing', 'shenaniganing', 'doohickeying', 'thingamajigging',
  'gobbledygooking', 'malarkeying', 'bumfuzzling', 'lollygagging', 'snollygostering',
  'wibbling', 'canoodling', 'gallivanting', 'skedaddling', 'whatchamacalling'
];

// djb2-ish string hash → stable index into FUN_NAMES.
function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0;
  return h;
}

function maskText(value) {
  return FUN_NAMES[hashStr(String(value ?? '')) % FUN_NAMES.length];
}

function displayProject(name, index) {
  return privacy ? maskText(name) : name;
}

function displayHighlight(h, index) {
  if (!privacy || !/project/i.test(h.title)) return h.value;
  return displayProject(h.value, index);
}

function render(data) {
  wrapped = data;
  const totals = data.totals || {};
  document.getElementById('generated-at').textContent = data.generated_at ? new Date(data.generated_at).toLocaleString() : '';
  document.getElementById('hero-copy').textContent =
    totals.prompts > 0
      ? `${fmt(totals.prompts)} prompts across ${fmt(totals.sources)} loaded sources. Raw prompts stay local and are never rendered.`
      : 'No parseable local history yet. Use Sample to preview the wrapped layout.';

  renderScoreboard(totals);
  renderSources(data.sources || []);
  renderHighlights(data.highlights || []);
  renderAgents(data.source_breakdown || []);
  renderProjects(data.projects || []);
  renderTimeline((data.timeline || {}).weeks || []);
}

function renderScoreboard(totals) {
  const items = [
    ['Prompts', totals.prompts],
    ['Sessions', totals.sessions],
    ['Projects', totals.projects],
    ['Est. tokens', totals.estimated_tokens]
  ];
  document.getElementById('scoreboard').innerHTML = items.map(([label, value]) => `
    <div class="metric">
      <span class="metric-value">${fmt(value || 0)}</span>
      <span class="metric-label">${esc(label)}</span>
    </div>
  `).join('');
}

function renderSources(sources) {
  // Hide tools that simply aren't installed — a "missing" card for a tool the
  // user never had is noise. Detected-but-unparsed tools (folder found, no
  // parser yet) stay, but say "parser pending" instead of a misleading "0 records".
  const visible = sources.filter(s => s.state !== 'missing');
  document.getElementById('sources').innerHTML = visible.map(source => {
    const recs = source.records > 0 ? `${fmt(source.records)} records`
      : source.state === 'error' ? 'read error'
      : 'parser pending';
    return `
    <article class="source ${esc(source.state)}">
      <div class="source-name">${esc(source.name)}</div>
      <div class="source-state">${esc(source.state)} / ${recs}<br>${esc(source.message || '')}</div>
    </article>`;
  }).join('');
}

function renderHighlights(highlights) {
  const el = document.getElementById('highlights');
  if (!highlights.length) {
    el.innerHTML = '<div class="empty">No wrapped cards yet.</div>';
    return;
  }
  el.innerHTML = highlights.map((h, i) => `
    <article class="wrapped-card">
      <div class="wrapped-title">${esc(h.title)}</div>
      <div class="wrapped-value">${esc(displayHighlight(h, i))}</div>
      <div class="wrapped-detail">${esc(h.detail)}</div>
    </article>
  `).join('');
}

function renderAgents(agents) {
  const el = document.getElementById('agents');
  if (!agents.length) {
    el.innerHTML = '<div class="empty">No loaded agent history.</div>';
    return;
  }
  const max = Math.max(...agents.map(a => a.prompts), 1);
  el.innerHTML = agents.map(agent => `
    <article class="agent-row">
      <div class="row-top">
        <span class="row-name">${esc(agent.name)}</span>
        <span class="row-meta">${fmt(agent.prompts)} prompts</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${Math.max(4, agent.prompts / max * 100).toFixed(1)}%"></div></div>
    </article>
  `).join('');
}

function renderProjects(projects) {
  const el = document.getElementById('projects');
  if (!projects.length) {
    el.innerHTML = '<div class="empty">No loaded projects yet.</div>';
    return;
  }
  const top = projects.slice(0, 8);
  const max = Math.max(...top.map(p => p.prompts), 1);
  el.innerHTML = top.map((project, index) => `
    <article class="project-row">
      <div class="row-top">
        <span class="row-name">${esc(displayProject(project.name, index))}</span>
        <span class="row-meta">${fmt(project.prompts)} / ${esc(project.source)}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${Math.max(4, project.prompts / max * 100).toFixed(1)}%"></div></div>
    </article>
  `).join('');
}

function renderTimeline(weeks) {
  const el = document.getElementById('weeks');
  document.getElementById('timeline-stamp').textContent = weeks.length ? `${weeks.length} active weeks` : '';
  if (!weeks.length) {
    el.innerHTML = '<div class="empty">No weekly activity yet.</div>';
    return;
  }
  const max = Math.max(...weeks.map(w => w.prompts), 1);
  el.innerHTML = weeks.map(week => `
    <div class="week" title="${esc(week.label)} / ${fmt(week.prompts)} prompts">
      <div class="week-bar" style="height:${Math.max(4, week.prompts / max * 100).toFixed(1)}%"></div>
      <div class="week-label">${esc((week.week || '').replace(/^\d{4}-/, ''))}</div>
    </div>
  `).join('');
}

function exportSVG() {
  if (!wrapped) return;
  const totals = wrapped.totals || {};
  const highlights = (wrapped.highlights || []).slice(0, 4);
  const rows = highlights.map((h, i) => `
    <text x="58" y="${278 + i * 70}" font-size="18" font-family="monospace" font-weight="700">${escapeXML(h.title.toUpperCase())}</text>
    <text x="58" y="${310 + i * 70}" font-size="34" font-family="Georgia" font-weight="900">${escapeXML(displayHighlight(h, i)).slice(0, 32)}</text>
  `).join('');

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
    <rect width="1200" height="675" fill="#f6f1e4"/>
    <path d="M0 0h1200v675H0z" fill="none" stroke="#16130f" stroke-width="18"/>
    <rect x="42" y="42" width="1116" height="591" fill="#fffaf0" stroke="#16130f" stroke-width="5"/>
    <rect x="58" y="58" width="256" height="42" fill="#b7ff4a" stroke="#16130f" stroke-width="4"/>
    <text x="76" y="86" font-size="20" font-family="monospace" font-weight="900">CC-LENS WRAPPED</text>
    <text x="58" y="190" font-size="92" font-family="Georgia" font-weight="900">Agent Wrapped</text>
    <text x="780" y="128" font-size="88" font-family="Georgia" font-weight="900">${escapeXML(fmt(totals.prompts || 0))}</text>
    <text x="786" y="164" font-size="20" font-family="monospace" font-weight="900">PROMPTS</text>
    <text x="780" y="246" font-size="54" font-family="Georgia" font-weight="900">${escapeXML(fmt(totals.sources || 0))} sources</text>
    ${rows}
    <text x="58" y="604" font-size="18" font-family="monospace" fill="#6e675e">Raw prompts stay local. Generated by cc-lens.</text>
  </svg>`;

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cc-lens-wrapped.svg';
  a.click();
  URL.revokeObjectURL(url);
}

function escapeXML(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

document.getElementById('privacy-btn').addEventListener('click', () => {
  privacy = !privacy;
  // Button shows the action: when masked, you can Reveal; when shown, you can Mask.
  document.getElementById('privacy-btn').textContent = privacy ? 'Reveal' : 'Mask';
  if (wrapped) render(wrapped);
});

document.getElementById('sample-btn').addEventListener('click', () => render(sampleWrapped));
document.getElementById('export-btn').addEventListener('click', exportSVG);

fetch('/api/wrapped')
  .then(response => {
    if (!response.ok) throw new Error('Failed to load wrapped data');
    return response.json();
  })
  .then(render)
  .catch(() => render(sampleWrapped));
</script>
</body>
